<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>S@dB0Y Tzy</title>
  <!-- Font monospace berkelas -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 30%, #0e0e0e, #010101);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Efek scanline retro, bikin nuansa monitor tua */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.18) 0px,
        rgba(0, 0, 0, 0.18) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
      width: 90%;
    }

    /* Placeholder logo – tinggal lo ganti src-nya */
    .logo-wrapper {
      margin-bottom: 2.5rem;
    }

    .logo-wrapper img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      border-radius: 50%;
      border: 2px dashed #2a2a2a;
      background: #0a0a0a;
      transition: border-color 0.3s;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.08));
    }

    .logo-wrapper img:hover {
      border-color: #5a5a5a;
    }

    /* Glitch utama - teks besar */
    .glitch {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 400;
      color: #d4d4d4;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      position: relative;
      display: inline-block;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
      word-break: break-word;
    }

    /* Data attribute buat ghost text */
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.9;
    }

    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 #ff00c8;
      clip: rect(0, 900px, 0, 0);
      animation: glitch-anim-1 2.2s infinite linear alternate-reverse;
      background: transparent;
    }

    .glitch::after {
      left: -2px;
      text-shadow: -2px 0 #00ffff;
      clip: rect(0, 900px, 0, 0);
      animation: glitch-anim-2 2.8s infinite linear alternate-reverse;
      background: transparent;
    }

    /* Pesan buat admin – kalem tapi tetap berkelas */
    .admin-msg {
      font-size: 1.2rem;
      color: #9a9a9a;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.8rem;
      background: rgba(20, 20, 20, 0.7);
      padding: 0.7rem 1.2rem;
      border-radius: 4px;
      border-left: 3px solid #2c2c2c;
      letter-spacing: 0.05em;
    }

    /* Kursor kedip ala terminal */
    .cursor {
      font-weight: 700;
      color: #aaaaaa;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Keyframes glitch */
    @keyframes glitch-anim-1 {
      0% { clip: rect(18px, 9999px, 94px, 0); transform: skew(0.25deg); }
      10% { clip: rect(71px, 9999px, 36px, 0); transform: skew(0.2deg); }
      20% { clip: rect(7px, 9999px, 49px, 0); transform: skew(0.5deg); }
      30% { clip: rect(82px, 9999px, 11px, 0); transform: skew(0.1deg); }
      40% { clip: rect(40px, 9999px, 67px, 0); transform: skew(0.35deg); }
      50% { clip: rect(95px, 9999px, 24px, 0); transform: skew(0.05deg); }
      60% { clip: rect(13px, 9999px, 78px, 0); transform: skew(0.45deg); }
      70% { clip: rect(56px, 9999px, 8px, 0); transform: skew(0.15deg); }
      80% { clip: rect(63px, 9999px, 39px, 0); transform: skew(0.3deg); }
      90% { clip: rect(27px, 9999px, 85px, 0); transform: skew(0.6deg); }
      100% { clip: rect(44px, 9999px, 53px, 0); transform: skew(0.4deg); }
    }

    @keyframes glitch-anim-2 {
      0% { clip: rect(91px, 9999px, 15px, 0); transform: skew(0.5deg); }
      10% { clip: rect(4px, 9999px, 61px, 0); transform: skew(0.25deg); }
      20% { clip: rect(33px, 9999px, 82px, 0); transform: skew(0.15deg); }
      30% { clip: rect(52px, 9999px, 7px, 0); transform: skew(0.55deg); }
      40% { clip: rect(70px, 9999px, 19px, 0); transform: skew(0.1deg); }
      50% { clip: rect(11px, 9999px, 98px, 0); transform: skew(0.7deg); }
      60% { clip: rect(77px, 9999px, 42px, 0); transform: skew(0.4deg); }
      70% { clip: rect(35px, 9999px, 66px, 0); transform: skew(0.2deg); }
      80% { clip: rect(88px, 9999px, 29px, 0); transform: skew(0.35deg); }
      90% { clip: rect(21px, 9999px, 54px, 0); transform: skew(0.6deg); }
      100% { clip: rect(60px, 9999px, 13px, 0); transform: skew(0.45deg); }
    }

    /* Responsif buat mobile */
    @media (max-width: 480px) {
      .logo-wrapper img {
        width: 120px;
        height: 120px;
      }
      .admin-msg {
        font-size: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo placeholder – ganti src dengan foto lo -->
    <div class="logo-wrapper">
      <!-- 
        Saat ini gambar hanya placeholder "LOGO".
        Lo tinggal ganti src dengan gambar lo, misal:
        src="foto-lo.png"
        Biarkan width/height 150px, nanti nyesuaiin objek-fit.
      -->
      <img 
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRCXC3Ankcf0E39x_evQ4vJmeEqWFIqhgxHrJvQ8rvGvw&s=10"
        alt="Your Logo"
        title="Ganti dengan logo lo"
      />
    </div>

    <!-- Teks glitch utama -->
    <h1 class="glitch" data-text="Hacked By S@dB0Y Tzy">
      DEFACE TEST :<
    </h1>

    <!-- Pesan buat admin, dikasih kursor ketik -->
    <p class="admin-msg">
      <span>WALAH CUMA TEST BANG JANGAN PANIK</span>
      <span class="cursor">_</span>
    </p>
  </div>
</body>
</html>
